name: Build & Test
on:
  workflow_call:

permissions:
  contents: read

jobs:
  build-test:
    name: Build & Test (${{ matrix.os }})
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, windows-latest, macos-latest]
    permissions:
      contents: read
      checks: write
      pull-requests: write
    steps:
      - name: Checkout
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0

      - name: Setup .NET
        uses: actions/setup-dotnet@26b0ec14cb23fa6904739307f278c14f94c95bf1 # v5.4.0
        with:
          dotnet-version: '10.0.x'

      - name: Restore
        run: dotnet restore

      - name: Build
        run: dotnet build -c Release --no-restore

      - name: Format check
        if: runner.os == 'Linux'
        run: dotnet format UniswapSharp.sln --verify-no-changes

      - name: Test
        run: >
          dotnet test -c Release --no-build
          --logger "trx;LogFileName=test-results.trx"
          --results-directory ${{ github.workspace }}/TestResults
          --collect:"XPlat Code Coverage"

      # --- Reporting (single OS leg to avoid duplicate comments) ---
      - name: Publish test results
        if: always() && runner.os == 'Linux'
        uses: EnricoMi/publish-unit-test-result-action@82082dac68ad6a19d980f8ce817e108b9f496c2a # v2.17.1
        with:
          check_name: "Test Results"
          files: "${{ github.workspace }}/TestResults/**/*.trx"

      - name: Coverage report
        if: always() && runner.os == 'Linux'
        uses: danielpalme/ReportGenerator-GitHub-Action@049f7ec958c672fd31d5cc1cb01622dc8d2e23ab # v5.5.10
        with:
          reports: "${{ github.workspace }}/TestResults/**/coverage.cobertura.xml"
          targetdir: "${{ github.workspace }}/coveragereport"
          reporttypes: "Cobertura;MarkdownSummaryGithub"
          assemblyfilters: "-UniswapSharp.Testing"

      - name: Write coverage to job summary
        if: always() && runner.os == 'Linux'
        shell: bash
        run: cat "${{ github.workspace }}/coveragereport/SummaryGithub.md" >> "$GITHUB_STEP_SUMMARY" || true

      - name: Coverage PR comment
        if: always() && runner.os == 'Linux' && github.event_name == 'pull_request'
        uses: marocchino/sticky-pull-request-comment@5770ad5eb8f42dd2c4f34da00c94c5381e49af88 # v3.0.5
        with:
          header: coverage
          recreate: true
          path: "${{ github.workspace }}/coveragereport/SummaryGithub.md"

      - name: Upload test artifacts
        if: always() && runner.os == 'Linux'
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          name: test-results
          path: |
            ${{ github.workspace }}/TestResults/**/*.trx
            ${{ github.workspace }}/coveragereport/**
          retention-days: 7
